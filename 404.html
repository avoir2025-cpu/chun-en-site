<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>找不到頁面｜CHUN.EN 形象美學</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#14100B" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #14100B;
      color: #F5F1E8;
      font-family: "Noto Serif TC", serif;
      text-align: center;
      padding: 2rem;
    }
    .n { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(5rem, 15vw, 9rem); font-weight: 400; color: #A88A5C; line-height: 1; }
    h1 { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 300; margin-top: 1.2rem; letter-spacing: 0.08em; }
    p { margin-top: 1rem; font-weight: 200; color: #B8AC9A; font-size: 0.95rem; line-height: 2; }
    a.btn {
      display: inline-block;
      margin-top: 2.2rem;
      padding: 0.9rem 2.4rem;
      border: 1px solid #A88A5C;
      color: #A88A5C;
      text-decoration: none;
      letter-spacing: 0.2em;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    a.btn:hover { background: #A88A5C; color: #14100B; }
  </style>
</head>
<body>
  <div>
    <div class="n">404</div>
    <h1>這個頁面不在你要找的位置</h1>
    <p>頁面可能已經搬遷或更名——就像形象，需要跟上你的下一階段。</p>
    <a class="btn" href="/">回到 CHUN.EN 首頁</a>
  </div>
</body>
</html>
